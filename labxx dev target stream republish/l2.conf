port: 4242
http_port: 8242

server_name: l2

cluster: {
  name: L2
}

leafnodes {
  remotes [
    { urls: ["nats-leaf://l2:x@localhost:7422"], account: EDGE, deny_exports: [ "edge.>" ], deny_imports: [ "edge.>" ] }
  ]
}

jetstream {
  store_dir: "./js/l2"
  domain: "L2"
}

accounts: {
  EDGE: {
    jetstream:true
    users: [ 
      { user: e, password: x }
    ]
  }
}
